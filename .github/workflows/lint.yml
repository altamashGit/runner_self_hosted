name: App build

on:
    push:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
     - name: git checkout
       uses: actions/checkout@v6

     - name: print wrking directory    
       run: |    
         pwd
         ls

     - name: Docker build
       uses: docker/setup-buildx-action@v3
     - name: docker build
       run: |
         docker build . -t myapp
     - name: Container run
       run: |
         docker run -dp 5000:5000 myapp
     - name: Test
       continue-on-error: true
       run: |
         curl -f localhost:5000 || echo "Server not ready" 
       