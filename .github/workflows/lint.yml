name: Lint Check

on:
    push: 
      branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8


      - name: Code Scaning
        run: |
          python -m flake8 .

          echo "Code Scaning sucessfully.....!!!"