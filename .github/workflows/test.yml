name: Run Tests

on:
    workflow_run:
       workflows: ["Lint Check"]
       types:
        - completed

jobs:
    test:
        runs-on: ubuntu-latest
        
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                python-version: "3.13"

            - run: |
                pip install --upgrade pip
                pip install -r requirements.txt
                pip install pytest

            - name: Run Tests
              run: pytest || true