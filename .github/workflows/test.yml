name: Run Test

on:
    workflow_run:
       workflows: ["Lint Check"]
       types:
        - completed

jobs:
    test:
        runs-on: ubuntu-latest
        
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                python-version: "3.1"

            - run: |
                pip install -r requrements.txt
                pip install pytest

            - name: Run Tests
              run: pytest