name: Docker Build & Push

on:
    workflow_run:
        workflows: ["Bild Artifact"]
        types:
            -  completed

jobs:
    docker:
        runs-on: ubuntu-latest
        
        steps:
            - name: code Chekout
              uses: actions/checkout@v6

            - name: Login to DockreHub
              uses: docker/login-action@v4
              with:
                 username: ${{ vars.DOCKERHUB_USERNAME }}
                 password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Build Docker Image
              run: |
                docker build -t ${{ vars.DOCKERHUB_USERNAME }}/python-app:latest .
            - name: Push Docker Image to DockerHUb
              run: |
               docker push ${{ vars.DOCKERHUB_USERNAME }}//python-app:latest .
              
               