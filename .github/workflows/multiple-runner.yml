name: Multiple runner
on: push

jobs:
  ubunutu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print Ubuntu Info
        run: |
          echo "OS: Ubuntu"
          hostname
          whoami
  windows-job:
    runs-on: windows-latest
    steps:
      - name: print winosw info
        run: |
          echo "OS: Window Info"
          hostname
          whoami


  mac-os-job:
    runs-on: macos-latest
    steps:
      - name: Print macOs info
        run: |
          echo "OS: macOs"
          hostname
          whoami
          pwd
